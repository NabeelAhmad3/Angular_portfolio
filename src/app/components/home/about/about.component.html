<div id="about" class="relative z-50 border-t my-12 lg:my-24 border-[#25213b]">
  <img src="assets/section.svg" alt="Hero" class="absolute top-0 -z-10 w-full">

    <div class="flex justify-center -translate-y-[1px]">
        <div class="w-3/4">
            <div class="h-[1px] bg-gradient-to-r from-transparent via-violet-500 to-transparent w-full"></div>
        </div>
    </div>
      <div class="flex justify-center my-5 lg:py-8">
        <div class="flex items-center">
            <span class="w-24 h-[2px] bg-[#1a1443]"></span>
            <span class="bg-[#1a1443] w-fit text-white p-2 px-5 text-xl rounded-md">
                About
            </span>
            <span class="w-24 h-[2px] bg-[#1a1443]"></span>
        </div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-16">
        <div class="order-2 lg:order-1">
            <p class="font-medium mb-5 text-cyan-400 text-xl uppercase">
                Who I am?
            </p>
            <p class="text-gray-200 text-sm lg:text-lg text-justify">
                {{ personalData.description }}
            </p>

        </div>
        <div class="flex justify-center order-1 lg:order-2 h-[250px] min-h-[310px]">
            <img [src]="personalData.profile" alt="Nabeel Ahmad"
                class="rounded-lg transition-all duration-1000 grayscale hover:grayscale-0 hover:scale-110 cursor-pointer w-[270px] h-[320px] object-cover" />
        </div>
    </div>
</div>
